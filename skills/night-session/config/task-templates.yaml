# Night Task Templates v2 — оптимизированные после аудита 30.03.2026
# Убраны дубли с cron-скриптами: capsule_audit_l2, block_monitor, proactive_message, handoff_update
# Добавлены: evolution-related задачи

templates:

  # === КОНТЕНТ (ценные, оставить) ===

  content_neuro_tseh:
    name: "Контент @neuro_tseh"
    description: "Генерация 7 постов через channel-autopilot"
    skill: "channel-autopilot"
    priority: 3
    frequency: "2x_week"
    estimated_minutes: 15
    prompt: |
      Запусти скрипт channel-autopilot для @neuro_tseh:
      python3 scripts/channel-autopilot.py --channel @neuro_tseh --max-posts 7
      Убедись что посты созданы и запланированы.
    validation:
      type: "command_exit_code"
    tags: ["content", "autopilot"]

  content_neural_cex:
    name: "Авторский контент @neural_cex"
    description: "1-2 поста в стиле Дмитрия для основного канала"
    skill: "brand-voice-clone"
    priority: 2
    frequency: "2x_week"
    estimated_minutes: 20
    prompt: |
      Прочитай .agent/skills/brand-voice-clone/SKILL.md.
      Создай 1-2 поста для канала @neural_cex в стиле Дмитрия.
      Темы: AI-агенты, автоматизация, продуктивность, Neura.
      Сохрани посты в /tmp/neural_cex_posts.md.
    validation:
      type: "file_exists"
      path: "/tmp/neural_cex_posts.md"
    tags: ["content", "brand-voice"]

  # === IMPROVEMENT (ценные) ===

  skill_improvement:
    name: "Докрутка скилла"
    description: "Улучшение скилла по урокам из последних сессий"
    skill: "skill-creator"
    priority: 6
    frequency: "weekly"
    estimated_minutes: 15
    prompt_template: |
      Задача: улучшить скилл {skill_name}.
      1. Прочитай .agent/skills/{skill_name}/SKILL.md
      2. Прочитай SESSION_LOG.md (последние 30 строк) — найди упоминания
      3. Найди уроки: что работало, что ломалось, паттерны
      4. Обнови SKILL.md: добавь уроки, убери устаревшее, улучши
      НЕ удаляй существующий контент, только дополняй/обновляй.
    validation:
      type: "file_modified"
      path_template: ".agent/skills/{skill_name}/SKILL.md"
    tags: ["meta", "improvement"]

  market_research:
    name: "AI Market Digest"
    description: "Еженедельный дайджест AI-рынка"
    skill: "market-research"
    priority: 5
    frequency: "weekly"
    estimated_minutes: 25
    prompt: |
      Прочитай .agent/skills/market-research/SKILL.md.
      Создай еженедельный дайджест: новые AI-инструменты, тренды, конкуренты Neura.
      Сохрани в /tmp/ai-market-digest.md.
    validation:
      type: "file_exists"
      path: "/tmp/ai-market-digest.md"
    tags: ["research", "market"]

  # === DEEP AUDIT (weekly, вместо удалённых daily дублей) ===

  capsule_deep_audit:
    name: "Глубокий аудит одного бота"
    description: "L1 аудит: функциональный тест, код, логи, memory"
    skill: "capsule-audit"
    priority: 4
    frequency: "weekly"
    estimated_minutes: 20
    prompt_template: |
      Прочитай .agent/skills/capsule-audit/SKILL.md.
      Проведи глубокий тест бота {bot_name}:
      - Код: синтаксис, устаревшие паттерны
      - Логи за 7 дней: паттерны ошибок
      - Memory: learnings, corrections, diary — актуальность
      - CLAUDE.md: drift от эталона (используй scripts/claudemd-drift-detector.py)
      Сохрани в /tmp/deep-audit-{bot_id}.md.
    validation:
      type: "file_exists"
      path_template: "/tmp/deep-audit-{bot_id}.md"
    tags: ["infra", "audit", "deep"]

  # === SELF-EVOLUTION (новые) ===

  capsule_drift_sync:
    name: "Синхронизация CLAUDE.md с эталоном"
    description: "Применить обновления эталона ко всем капсулам с drift"
    priority: 3
    frequency: "weekly"
    estimated_minutes: 15
    prompt: |
      1. Запусти: python3 scripts/claudemd-drift-detector.py
      2. Для каждой капсулы с drift_score > 5:
         - Прочитай эталон: neura-capsule/CLAUDE.md.template
         - Прочитай CLAUDE.md капсулы
         - Добавь недостающие секции (instruments, file_work, no_fixation_leak)
         - НЕ удаляй уникальные секции капсулы
      3. Сохрани отчёт в /tmp/drift-sync-report.md
    validation:
      type: "file_exists"
      path: "/tmp/drift-sync-report.md"
    tags: ["evolution", "capsule", "sync"]

  intelligence_feed:
    name: "Intelligence Feed — парсинг каналов"
    description: "Спарсить TG-каналы, извлечь применимые идеи для Neura"
    priority: 5
    frequency: "weekly"
    estimated_minutes: 20
    prompt: |
      Используй readonly Telethon сессию (/root/Antigravity/.secrets/telegram_userbot_readonly.session).
      Спарсить последние 20 постов из:
      - @AI_Handler — Claude Code tips, MCP, skills
      - @xor_journal — AI тренды, технологии
      Для каждого поста: title, date, applicability to Neura (1-5).
      Если score >= 4: записать в _patches/pending/ как improvement proposal.
      Сохрани дайджест в /tmp/intelligence-feed.md.
    validation:
      type: "file_exists"
      path: "/tmp/intelligence-feed.md"
    tags: ["research", "intelligence", "evolution"]

  # === ON-DEMAND (по запросу через NIGHT_TASKS.md) ===

  client_content_plan:
    name: "Контент-план для клиента"
    description: "Генерация контент-плана для конкретного клиента"
    skill: "content-creator"
    priority: 4
    frequency: "on_demand"
    estimated_minutes: 20
    prompt_template: |
      Создай контент-план для {client_name} на следующую неделю.
      Учитывай стратегию из {strategy_file}.
      Сохрани в /tmp/content-plan-{client_id}.md.
    validation:
      type: "file_exists"
      path_template: "/tmp/content-plan-{client_id}.md"
    tags: ["content", "client"]

  pdf_document:
    name: "Генерация PDF-документа"
    description: "Создание PDF из markdown по запросу"
    skill: "notion-pdf"
    priority: 5
    frequency: "on_demand"
    estimated_minutes: 10
    prompt_template: |
      Создай документ: {document_description}.
      Сохрани markdown в {md_path}.
      Сгенерируй PDF: python3 .agent/skills/notion-pdf/scripts/md2pdf.py --input {md_path} --output {pdf_path}.
    validation:
      type: "file_exists"
      path_template: "{pdf_path}"
    tags: ["document", "pdf"]
