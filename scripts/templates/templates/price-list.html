<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><style>
@page { size: A4; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DejaVu Sans', system-ui, sans-serif; color: #1a1a2e; line-height: 1.6; font-size: 12px; }

.header {
    background: {{brand}}; color: white; padding: 35px 50px;
    display: flex; justify-content: space-between; align-items: center;
}
.header h1 { font-size: 24px; }
.header .info { text-align: right; font-size: 11px; opacity: 0.8; }
.header .info .date { margin-top: 4px; }

.body { padding: 30px 50px; }

h2 { font-size: 15px; color: {{brand}}; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; }

/* === TARIFF CARDS === */
.tariffs { display: flex; gap: 16px; margin: 20px 0; }
.tariff {
    flex: 1; border: 2px solid #eee; border-radius: 14px; padding: 24px; text-align: center;
    position: relative; transition: all 0.2s;
}
.tariff.featured {
    border-color: {{brand}}; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transform: scale(1.02);
}
.tariff .badge {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    background: {{accent}}; color: {{dark}}; font-size: 10px; font-weight: 700;
    padding: 4px 14px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
}
.tariff h3 { font-size: 16px; color: {{brand}}; margin-bottom: 8px; }
.tariff .price { font-size: 28px; font-weight: bold; color: {{dark}}; margin: 10px 0; }
.tariff .price .period { font-size: 12px; font-weight: normal; color: #999; }
.tariff .features { list-style: none; padding: 0; text-align: left; margin-top: 14px; }
.tariff .features li { padding: 6px 0; font-size: 11px; border-bottom: 1px solid #f5f5f5; }
.tariff .features li::before { content: "\2713"; color: {{accent}}; margin-right: 8px; font-weight: bold; }

/* === TABLE === */
table { width: 100%; border-collapse: collapse; margin: 14px 0; }
thead tr { background: {{brand}}; }
th { color: white; padding: 11px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
tbody tr:nth-child(even) { background: #fafafe; }

.note { background: #f8f7ff; border-left: 3px solid {{brand}}; padding: 14px 18px; margin: 16px 0; font-size: 11px; color: #555; border-radius: 0 8px 8px 0; }

/* === PAGE BREAK PROTECTION === */
h2, h3 { break-after: avoid; page-break-after: avoid; }
table, .tariff, .tariffs, .note, blockquote, img {
    break-inside: avoid; page-break-inside: avoid;
}
tr { break-inside: avoid; page-break-inside: avoid; }
thead { display: table-header-group; }
p { orphans: 3; widows: 3; }
h2 + *, h3 + * { break-before: avoid; page-break-before: avoid; }

.footer {
    background: {{dark}}; color: white; padding: 18px 50px; font-size: 10px;
    display: flex; justify-content: space-between;
    position: fixed; bottom: 0; left: 0; right: 0;
}

</style></head><body>

<div class="header">
    <h1>{{title}}</h1>
    <div class="info">
        <div>{{author}}</div>
        <div class="date">{{date}}</div>
    </div>
</div>

<div class="body">
{{content}}
</div>

<div class="footer">
    <div>{{author}}</div>
    <div>{{date}}</div>
</div>

</body></html>
